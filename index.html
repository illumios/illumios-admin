<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Illumios Mission Control</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="assets/styles.css" />
  <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body>

<!-- SIGN-IN GATE -->
<div id="gate">
  <div id="gate-box">
    <div class="logo-wrap">
      <svg width="180" height="36" viewBox="0 0 220 36" fill="none" xmlns="http://www.w3.org/2000/svg">
        <text x="0" y="28" font-family="Nunito, sans-serif" font-weight="800" font-size="28" fill="#FAF7F2">illumios</text>
        <polygon points="200,4 210,14 200,24 190,14" fill="#F26522"/>
        <polygon points="200,8 207,14 200,20 193,14" fill="#FAF7F2" opacity="0.9"/>
      </svg>
    </div>
    <h2>Mission Control</h2>
    <p>Sign in with your illumios.com Google account</p>
    <div id="g-signin-btn"></div>
    <div id="gate-error" role="alert"></div>
  </div>
</div>

<!-- APP SHELL -->
<div id="app" hidden>
  <aside id="sidebar">
    <div class="sidebar-brand">
      <svg width="140" height="28" viewBox="0 0 200 32" fill="none" xmlns="http://www.w3.org/2000/svg">
        <text x="0" y="25" font-family="Nunito, sans-serif" font-weight="800" font-size="24" fill="#FAF7F2">illumios</text>
        <polygon points="180,2 190,12 180,22 170,12" fill="#F26522"/>
        <polygon points="180,6 187,12 180,18 173,12" fill="#FAF7F2" opacity="0.85"/>
      </svg>
    </div>
    <nav id="sidebar-nav" aria-label="Primary"></nav>
    <div class="sidebar-footer">
      <div class="user-chip" id="user-chip">—</div>
      <button id="sign-out-btn" type="button">Sign Out</button>
    </div>
  </aside>

  <main id="main">
    <header id="topbar">
      <div class="topbar-left">
        <h1 id="page-title">Home</h1>
        <span class="date-chip" id="nav-date"></span>
      </div>
      <div class="topbar-right">
        <span class="phase-chip" id="phase-chip">Phase 1 — Foundation</span>
      </div>
    </header>
    <section id="view"></section>
  </main>
</div>

<script type="module" src="app.js"></script>
</body>
</html>
